version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/duolingo-duel
      - JWT_SECRET=change_me_for_prod
      - PORT=5000
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:5173

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
